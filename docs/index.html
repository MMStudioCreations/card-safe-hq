<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Vault AI • Scan, Grade, Collect</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070a14;
        --bg-elev: #10172b;
        --bg-soft: #151f38;
        --card: rgba(20, 31, 56, 0.88);
        --border: rgba(130, 163, 255, 0.24);
        --text: #edf2ff;
        --muted: #a8b6dc;
        --primary: #6d7dff;
        --primary-2: #4ee3ff;
        --good: #67e8a5;
        --warn: #f9c86c;
        --danger: #ff8da1;
        --shadow: 0 24px 50px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 15% -5%, #243469 0%, transparent 35%),
          radial-gradient(circle at 85% -15%, #0f7eb6 0%, transparent 30%), var(--bg);
        min-height: 100vh;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .top-nav {
        position: sticky;
        top: 0;
        backdrop-filter: blur(14px);
        background: rgba(7, 10, 20, 0.82);
        border-bottom: 1px solid var(--border);
        z-index: 5;
      }

      .nav-inner {
        max-width: 1160px;
        margin: 0 auto;
        padding: 0.9rem 1rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        justify-content: space-between;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.7rem;
      }

      .brand-mark {
        width: 2rem;
        height: 2rem;
        border-radius: 0.7rem;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        box-shadow: 0 6px 20px rgba(109, 125, 255, 0.55);
      }

      .brand h1 {
        font-size: 1rem;
        margin: 0;
      }

      .links {
        display: flex;
        gap: 0.35rem;
        flex-wrap: wrap;
      }

      .nav-link {
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 0.45rem 0.75rem;
        color: var(--muted);
        transition: 180ms ease;
        font-size: 0.95rem;
      }

      .nav-link:hover,
      .nav-link.active {
        border-color: var(--border);
        background: rgba(109, 125, 255, 0.18);
        color: #fff;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .button {
        border: 1px solid transparent;
        border-radius: 0.8rem;
        background: linear-gradient(135deg, var(--primary), #5f57ff);
        color: white;
        font-weight: 650;
        padding: 0.65rem 0.9rem;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
      }

      .button:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 22px rgba(83, 95, 255, 0.3);
      }

      .button:active {
        transform: translateY(0);
      }

      .button.secondary {
        background: transparent;
        border-color: var(--border);
        color: #f4f7ff;
      }

      main {
        max-width: 1160px;
        width: 100%;
        margin: 0 auto;
        padding: 1.2rem 1rem 2.2rem;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 1rem;
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 2rem;
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 1.2rem;
      }

      .eyebrow {
        display: inline-flex;
        border-radius: 999px;
        background: rgba(78, 227, 255, 0.12);
        color: #cbf5ff;
        border: 1px solid rgba(78, 227, 255, 0.35);
        padding: 0.3rem 0.65rem;
        font-size: 0.8rem;
        font-weight: 600;
        margin-bottom: 0.85rem;
      }

      .hero h2 {
        font-size: clamp(1.7rem, 3vw, 2.75rem);
        margin: 0;
        line-height: 1.15;
      }

      .hero p {
        color: var(--muted);
        margin-top: 0.9rem;
        line-height: 1.6;
      }

      .hero-ctas {
        margin-top: 1.15rem;
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }

      .hero-preview {
        padding: 1rem;
        border-radius: 0.9rem;
        border: 1px solid var(--border);
        background: linear-gradient(150deg, rgba(109, 125, 255, 0.2), rgba(16, 23, 43, 0.95));
      }

      .preview-header,
      .list-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .preview-header {
        margin-bottom: 1rem;
      }

      .chip {
        padding: 0.22rem 0.55rem;
        border-radius: 999px;
        font-size: 0.73rem;
        border: 1px solid rgba(103, 232, 165, 0.35);
        color: var(--good);
        background: rgba(103, 232, 165, 0.1);
      }

      .mock-card {
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 0.8rem;
        padding: 0.9rem;
        margin-bottom: 0.65rem;
        background: rgba(9, 14, 28, 0.65);
      }

      .muted {
        color: var(--muted);
      }

      .feature-grid,
      .stats-grid,
      .release-grid,
      .collection-grid,
      .detail-grid,
      .scan-grid,
      .auth-grid,
      .how-grid,
      .dashboard-grid {
        display: grid;
        gap: 0.8rem;
        margin-top: 0.9rem;
      }

      .feature-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      }

      .release-grid,
      .collection-grid {
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      }

      .dashboard-grid {
        grid-template-columns: 2fr 1fr;
      }

      .detail-grid,
      .scan-grid {
        grid-template-columns: 1.35fr 1fr;
      }

      .auth-grid {
        grid-template-columns: 1.2fr 1fr;
        align-items: stretch;
      }

      .how-grid {
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      }

      .tile {
        padding: 1rem;
        border-radius: 0.9rem;
        background: var(--bg-elev);
        border: 1px solid rgba(130, 163, 255, 0.23);
        transition: transform 170ms ease, border-color 170ms ease;
      }

      .tile:hover {
        transform: translateY(-3px);
        border-color: rgba(78, 227, 255, 0.5);
      }

      .tile h3,
      .tile h4,
      .section-title {
        margin: 0 0 0.4rem;
      }

      .section {
        margin-top: 0.9rem;
        padding: 1.1rem;
      }

      .stack {
        display: grid;
        gap: 0.7rem;
      }

      .input,
      select,
      textarea {
        width: 100%;
        background: #0c1328;
        color: var(--text);
        border: 1px solid rgba(130, 163, 255, 0.34);
        border-radius: 0.75rem;
        padding: 0.67rem 0.75rem;
      }

      .toolbar {
        display: flex;
        gap: 0.55rem;
        flex-wrap: wrap;
      }

      .metric {
        font-size: 1.35rem;
        font-weight: 700;
        margin-top: 0.4rem;
      }

      .upload-box {
        border: 1px dashed rgba(130, 163, 255, 0.65);
        border-radius: 0.9rem;
        background: linear-gradient(180deg, rgba(109, 125, 255, 0.1), rgba(21, 31, 56, 0.8));
        min-height: 220px;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 1rem;
        text-align: center;
      }

      .camera-frame {
        border-radius: 0.9rem;
        border: 2px solid rgba(78, 227, 255, 0.48);
        padding: 1rem;
      }

      .kicker {
        font-size: 0.85rem;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: #c9d4f9;
      }

      .status-line {
        font-size: 0.9rem;
        color: #ccf7d8;
      }

      .footer {
        margin-top: auto;
        border-top: 1px solid var(--border);
        padding: 1.1rem;
        color: var(--muted);
        font-size: 0.9rem;
        text-align: center;
      }

      @media (max-width: 900px) {
        .hero,
        .dashboard-grid,
        .detail-grid,
        .scan-grid,
        .auth-grid {
          grid-template-columns: 1fr;
        }

        .nav-inner {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="top-nav">
        <div class="nav-inner">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true"></div>
            <h1>Card Vault AI</h1>
          </div>
          <nav class="links" id="navLinks"></nav>
          <div class="actions">
            <button class="button secondary" id="toggleAuth"></button>
            <button class="button" id="primaryNavAction">Scan a Card</button>
          </div>
        </div>
      </header>

      <main id="app"></main>

      <footer class="footer">
        Card Vault AI • Scan cards instantly, estimate condition, follow comps, and build your vault.
      </footer>
    </div>

    <script>
      const CONFIG = {
        DEFAULT_WORKER_BASE_URL: 'https://your-worker-name.your-subdomain.workers.dev',
      };

      const state = {
        signedIn: false,
        route: 'home',
        workerUrl: (window.WORKER_BASE_URL || localStorage.getItem('CARD_VAULT_WORKER_URL') || CONFIG.DEFAULT_WORKER_BASE_URL).replace(/\/$/, ''),
      };

      const mock = {
        stats: [
          { label: 'Total Cards', value: '248' },
          { label: 'Collection Value', value: '$18,460' },
          { label: 'Recent Scans', value: '14 this week' },
          { label: 'High Grade %', value: '72% PSA 9+' },
        ],
        releases: [
          { game: 'Pokémon', name: 'Destined Rivals ETB', date: 'Apr 19', hype: 'High' },
          { game: 'NBA', name: 'Prizm Basketball Hobby', date: 'May 07', hype: 'Very High' },
          { game: 'One Piece', name: 'Royal Blood OP-11', date: 'May 24', hype: 'Rising' },
          { game: 'MTG', name: 'Modern Horizons Set', date: 'Jun 13', hype: 'Steady' },
        ],
        cards: [
          { id: 'cv-102', name: 'Charizard ex', set: 'Paldean Fates', num: '#054', value: '$192', grade: '9.1' },
          { id: 'cv-337', name: 'LeBron James Silver', set: 'Prizm 2024', num: '#17', value: '$435', grade: '8.7' },
          { id: 'cv-508', name: 'Monkey D. Luffy Alt Art', set: 'OP-09', num: '#001', value: '$289', grade: '9.3' },
          { id: 'cv-611', name: 'Jace, the Mind Sculptor', set: 'Masters', num: '#031', value: '$118', grade: '8.9' },
        ],
        comps: [
          { source: 'eBay', price: '$205', when: '2 days ago' },
          { source: 'eBay', price: '$198', when: '5 days ago' },
          { source: 'PWCC', price: '$224', when: '1 week ago' },
        ],
      };

      const routes = {
        signedOut: ['home', 'scan', 'releases', 'auth'],
        signedIn: ['dashboard', 'scan', 'collection', 'releases', 'card'],
      };

      function navLabel(route) {
        const map = {
          home: 'Home',
          scan: 'Scan',
          releases: 'Releases',
          auth: 'Login',
          dashboard: 'Dashboard',
          collection: 'Collection',
          card: 'Card Detail',
        };
        return map[route] || route;
      }

      function displayRoute(route) {
        const available = state.signedIn ? routes.signedIn : routes.signedOut;
        if (!available.includes(route)) return available[0];
        return route;
      }

      function statusText() {
        if (!state.workerUrl || state.workerUrl.includes('your-worker-name.your-subdomain')) {
          return 'Worker API not configured — using fully mocked frontend data.';
        }
        return `Worker API configured: ${state.workerUrl}`;
      }

      async function getJson(path) {
        if (!state.workerUrl || state.workerUrl.includes('your-worker-name.your-subdomain')) {
          return null;
        }
        const response = await fetch(`${state.workerUrl}${path}`);
        const payload = await response.json();
        if (!response.ok || payload?.ok === false) {
          throw new Error(payload?.error || `Request failed (${response.status})`);
        }
        return payload;
      }

      function homePage() {
        const features = [
          ['Scan & Identify', 'Capture from camera or upload front/back and detect card metadata instantly.'],
          ['AI Estimated Grade', 'See centering, corners, edges, and surface signals before you submit to grading.'],
          ['Price Comps', 'View recent sold listings with confidence bands, trend direction, and market velocity.'],
          ['Collection Tracking', 'Store your entire vault with values, set progress, and quick notes.'],
          ['Release Calendar', 'Track product launches, set alerts, and plan smart buys before release day.'],
        ];

        return `
          <section class="panel hero">
            <div>
              <span class="eyebrow">Collector-grade intelligence</span>
              <h2>Scan cards. Know value. Build your vault with confidence.</h2>
              <p>Card Vault AI combines scan-based recognition, AI condition estimation, sold comp tracking, and release planning in one premium collector platform.</p>
              <div class="hero-ctas">
                <button class="button" data-route="scan">Scan a Card</button>
                <button class="button secondary" data-route="collection">Explore the Vault</button>
              </div>
              <p class="status-line" style="margin-top:0.8rem">${statusText()}</p>
            </div>
            <div class="hero-preview">
              <div class="preview-header">
                <strong>Live Product Preview</strong>
                <span class="chip">AI Grade Ready</span>
              </div>
              <div class="mock-card">
                <div class="list-row"><strong>Charizard ex #054</strong><span>$192</span></div>
                <small class="muted">Paldean Fates • Estimated Grade 9.1</small>
              </div>
              <div class="mock-card">
                <div class="list-row"><strong>Latest comp trend</strong><span style="color:var(--good)">+8.2%</span></div>
                <small class="muted">3 sold comps detected in the last 7 days</small>
              </div>
              <div class="mock-card">
                <div class="list-row"><strong>Next release</strong><span>Apr 19</span></div>
                <small class="muted">Pokémon Destined Rivals ETB</small>
              </div>
            </div>
          </section>

          <section class="panel section">
            <h3 class="section-title">What Card Vault AI does</h3>
            <div class="feature-grid">
              ${features
                .map(
                  ([title, desc]) => `<article class="tile"><h4>${title}</h4><p class="muted">${desc}</p></article>`,
                )
                .join('')}
            </div>
          </section>

          <section class="panel section">
            <h3 class="section-title">How it works</h3>
            <div class="how-grid">
              <article class="tile"><div class="kicker">Step 1</div><h4>Scan the card</h4><p class="muted">Use camera framing guides for front and back photos.</p></article>
              <article class="tile"><div class="kicker">Step 2</div><h4>AI identifies details</h4><p class="muted">Card name, set, number, and confidence score are detected.</p></article>
              <article class="tile"><div class="kicker">Step 3</div><h4>Review grade + comps</h4><p class="muted">Instant estimate for condition plus recent sold prices.</p></article>
              <article class="tile"><div class="kicker">Step 4</div><h4>Save to your vault</h4><p class="muted">Track values over time and prepare for listings or grading.</p></article>
            </div>
          </section>

          <section class="panel section">
            <div class="list-row"><h3 class="section-title">Upcoming releases</h3><button class="button secondary" data-route="releases">View full calendar</button></div>
            <div class="release-grid">
              ${mock.releases
                .slice(0, 3)
                .map(
                  (r) => `<article class="tile"><div class="kicker">${r.game}</div><h4>${r.name}</h4><p class="muted">Release: ${r.date} • Hype: ${r.hype}</p></article>`,
                )
                .join('')}
            </div>
          </section>

          <section class="panel section" style="text-align:center">
            <h3 style="margin:0">Start building your vault today</h3>
            <p class="muted">Guest scan now. Create your account when you want to save cards and unlock dashboards.</p>
            <div class="hero-ctas" style="justify-content:center">
              <button class="button" data-route="scan">Try a Scan</button>
              <button class="button secondary" data-route="auth">Create Account</button>
            </div>
          </section>
        `;
      }

      function authPage() {
        return `
          <section class="auth-grid">
            <article class="panel section">
              <span class="eyebrow">Collector Access</span>
              <h2 style="margin:0 0 0.4rem">Sign in to your vault</h2>
              <p class="muted">Save scans, track value movement, and manage your collection dashboard.</p>
              <div class="stack" style="margin-top:1rem">
                <label>Email <input class="input" type="email" placeholder="collector@email.com" /></label>
                <label>Password <input class="input" type="password" placeholder="••••••••" /></label>
                <button class="button" id="loginBtn">Log In</button>
                <button class="button secondary" id="signupBtn">Create Account</button>
                <button class="button secondary" data-route="scan">Continue as Guest</button>
              </div>
            </article>
            <article class="panel section">
              <h3 style="margin-top:0">Why create an account?</h3>
              <div class="stack">
                <div class="tile"><strong>Persistent collection vault</strong><p class="muted">Keep every card, grade estimate, and note in one place.</p></div>
                <div class="tile"><strong>Market movement tracking</strong><p class="muted">Watch recent sold price changes and spot momentum.</p></div>
                <div class="tile"><strong>Release alerts</strong><p class="muted">Never miss set launches you care about.</p></div>
              </div>
            </article>
          </section>
        `;
      }

      function dashboardPage() {
        return `
          <section class="stats-grid">
            ${mock.stats.map((s) => `<article class="tile"><div class="kicker">${s.label}</div><div class="metric">${s.value}</div></article>`).join('')}
          </section>

          <section class="dashboard-grid" style="margin-top:0.8rem">
            <article class="panel section">
              <div class="list-row"><h3 class="section-title">Recent card activity</h3><button class="button" data-route="scan">Scan card</button></div>
              <div class="stack">
                ${mock.cards
                  .map(
                    (c) => `<div class="tile list-row"><div><strong>${c.name}</strong><div class="muted">${c.set} • ${c.num}</div></div><div style="text-align:right"><strong>${c.value}</strong><div class="muted">AI ${c.grade}</div></div></div>`,
                  )
                  .join('')}
              </div>
            </article>
            <aside class="stack">
              <article class="panel section">
                <h3 class="section-title">Comps snapshot</h3>
                ${mock.comps.map((comp) => `<div class="list-row" style="margin-bottom:0.55rem"><span>${comp.source}</span><strong>${comp.price}</strong><small class="muted">${comp.when}</small></div>`).join('')}
              </article>
              <article class="panel section">
                <h3 class="section-title">Upcoming releases</h3>
                ${mock.releases
                  .slice(0, 3)
                  .map((release) => `<div style="margin-bottom:0.65rem"><strong>${release.name}</strong><div class="muted">${release.game} • ${release.date}</div></div>`)
                  .join('')}
              </article>
            </aside>
          </section>
        `;
      }

      function collectionPage() {
        return `
          <section class="panel section">
            <div class="list-row" style="gap:0.6rem;flex-wrap:wrap">
              <input class="input" style="max-width:360px" placeholder="Search cards, sets, numbers" />
              <div class="toolbar">
                <select><option>All Games</option><option>Pokémon</option><option>NBA</option><option>One Piece</option></select>
                <select><option>Sort: Value</option><option>Sort: Grade</option><option>Sort: Recently Added</option></select>
                <button class="button secondary">Grid</button>
                <button class="button secondary">List</button>
              </div>
            </div>
            <div class="collection-grid">
              ${mock.cards
                .map(
                  (c) => `
                    <article class="tile">
                      <div class="upload-box" style="min-height:140px;margin-bottom:0.7rem">
                        <strong>${c.name}</strong>
                      </div>
                      <h4 style="margin:0">${c.name}</h4>
                      <p class="muted" style="margin:0.3rem 0">${c.set} • ${c.num}</p>
                      <div class="list-row"><span>Est. Value</span><strong>${c.value}</strong></div>
                      <div class="list-row"><span>AI Grade</span><strong>${c.grade}</strong></div>
                      <button class="button secondary" style="width:100%;margin-top:0.7rem" data-route="card">View Card Detail</button>
                    </article>
                  `,
                )
                .join('')}
            </div>
          </section>

          <section class="panel section">
            <h3 class="section-title">Empty state preview</h3>
            <div class="upload-box" style="min-height:120px">
              <div>
                <strong>No cards match your filter.</strong>
                <p class="muted">Try removing filters or scan a new card to add it to your vault.</p>
              </div>
            </div>
          </section>
        `;
      }

      function cardDetailPage() {
        const selected = mock.cards[0];
        return `
          <section class="detail-grid">
            <article class="panel section">
              <div class="list-row"><h2 style="margin:0">${selected.name}</h2><span class="chip">${selected.set}</span></div>
              <p class="muted">Card #${selected.num} • Last updated 2h ago</p>
              <div class="release-grid" style="grid-template-columns:1fr 1fr">
                <div class="upload-box">Front Image</div>
                <div class="upload-box">Back Image</div>
              </div>
              <div class="hero-ctas">
                <button class="button secondary">Upload Front</button>
                <button class="button secondary">Upload Back</button>
              </div>
              <article class="tile" style="margin-top:0.8rem">
                <h4>Notes</h4>
                <textarea rows="4" placeholder="Centering looks strong; small whitening top-right corner."></textarea>
              </article>
            </article>

            <aside class="stack">
              <article class="panel section">
                <h3 class="section-title">AI Estimated Grade</h3>
                <div class="metric">${selected.grade}</div>
                <p class="muted">Confidence: 88% • Surface and centering are strongest sub-scores.</p>
                <div class="stack">
                  <div class="list-row"><span>Corners</span><strong>8.8</strong></div>
                  <div class="list-row"><span>Edges</span><strong>9.0</strong></div>
                  <div class="list-row"><span>Surface</span><strong>9.3</strong></div>
                  <div class="list-row"><span>Centering</span><strong>9.2</strong></div>
                </div>
              </article>
              <article class="panel section">
                <h3 class="section-title">Recent sold comps</h3>
                ${mock.comps.map((comp) => `<div class="list-row" style="margin-bottom:0.5rem"><span>${comp.source}</span><strong>${comp.price}</strong><small class="muted">${comp.when}</small></div>`).join('')}
              </article>
              <article class="panel section">
                <button class="button" style="width:100%">Update Collection</button>
                <button class="button secondary" style="width:100%;margin-top:0.6rem">Add to Collection</button>
              </article>
            </aside>
          </section>
        `;
      }

      function scanPage() {
        return `
          <section class="scan-grid">
            <article class="panel section">
              <span class="eyebrow">Mobile-first scanner</span>
              <h2 style="margin:0 0 0.6rem">Scan a card now</h2>
              <p class="muted">Use your camera for a guided scan, or upload front/back photos manually.</p>
              <div class="release-grid" style="grid-template-columns:1fr 1fr">
                <div class="upload-box"><div class="camera-frame"><strong>Front</strong><p class="muted">Align card edges with frame</p></div></div>
                <div class="upload-box"><div class="camera-frame"><strong>Back</strong><p class="muted">Capture corners and surface clearly</p></div></div>
              </div>
              <div class="hero-ctas">
                <button class="button">Open Camera</button>
                <button class="button secondary">Upload Images</button>
              </div>
              <p class="muted">Guest scans are enabled. Create an account to save scan history.</p>
            </article>
            <aside class="stack">
              <article class="panel section">
                <h3 class="section-title">Scan result preview</h3>
                <div class="tile">
                  <strong>Detected card</strong>
                  <p class="muted">Charizard ex • Paldean Fates #054</p>
                  <div class="list-row"><span>AI Grade</span><strong>9.1</strong></div>
                  <div class="list-row"><span>Est. Market</span><strong>$192</strong></div>
                </div>
              </article>
              <article class="panel section">
                <h3 class="section-title">Recent sold prices</h3>
                ${mock.comps.map((comp) => `<div class="list-row" style="margin-bottom:0.45rem"><span>${comp.source}</span><strong>${comp.price}</strong><small class="muted">${comp.when}</small></div>`).join('')}
                <button class="button" style="width:100%;margin-top:0.8rem">Save to Collection</button>
              </article>
            </aside>
          </section>
        `;
      }

      function releasesPage() {
        return `
          <section class="panel section">
            <div class="list-row" style="gap:0.6rem;flex-wrap:wrap">
              <h2 style="margin:0">Release Calendar</h2>
              <div class="toolbar">
                <select><option>All Games</option><option>Pokémon</option><option>NBA</option><option>One Piece</option><option>MTG</option></select>
                <select><option>All Types</option><option>Booster Box</option><option>ETB</option><option>Hobby</option></select>
              </div>
            </div>
            <p class="muted">Stay ahead of release drops and plan buys with confidence.</p>
            <div class="release-grid">
              ${mock.releases
                .map(
                  (r) => `<article class="tile"><div class="kicker">${r.game}</div><h4>${r.name}</h4><div class="list-row"><span>${r.date}</span><span class="chip" style="border-color:rgba(249,200,108,0.4);color:var(--warn)">${r.hype}</span></div></article>`,
                )
                .join('')}
            </div>
          </section>
        `;
      }

      const renderers = {
        home: homePage,
        auth: authPage,
        dashboard: dashboardPage,
        collection: collectionPage,
        card: cardDetailPage,
        scan: scanPage,
        releases: releasesPage,
      };

      function bindEvents() {
        document.querySelectorAll('[data-route]').forEach((el) => {
          el.addEventListener('click', () => {
            state.route = displayRoute(el.dataset.route);
            render();
          });
        });

        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        if (loginBtn) loginBtn.addEventListener('click', () => toggleSignedIn(true));
        if (signupBtn) signupBtn.addEventListener('click', () => toggleSignedIn(true));
      }

      function buildLinks() {
        const available = state.signedIn ? routes.signedIn : routes.signedOut;
        const links = document.getElementById('navLinks');
        links.innerHTML = available
          .map((route) => `<button class="nav-link ${route === state.route ? 'active' : ''}" data-route="${route}">${navLabel(route)}</button>`)
          .join('');
      }

      function toggleSignedIn(force) {
        state.signedIn = typeof force === 'boolean' ? force : !state.signedIn;
        state.route = state.signedIn ? 'dashboard' : 'home';
        render();
      }

      async function hydrateLiveData() {
        try {
          const [health, cards] = await Promise.all([getJson('/api/health'), getJson('/api/cards')]);
          if (health?.ok) mock.stats[2].value = 'Live API Connected';
          if (Array.isArray(cards?.cards) && cards.cards.length) {
            mock.cards = cards.cards.slice(0, 4).map((card, idx) => ({
              id: card.id || `live-${idx}`,
              name: card.name || 'Unknown Card',
              set: card.set_name || card.set || 'Unknown Set',
              num: card.card_number ? `#${card.card_number}` : '#--',
              value: card.estimated_value_usd ? `$${card.estimated_value_usd}` : '$--',
              grade: card.ai_grade_estimate ? String(card.ai_grade_estimate) : '—',
            }));
          }
        } catch {
          /* keep mock data */
        }
      }

      function render() {
        state.route = displayRoute(state.route);
        buildLinks();

        const toggleAuthButton = document.getElementById('toggleAuth');
        toggleAuthButton.textContent = state.signedIn ? 'Sign Out' : 'Sign In';
        toggleAuthButton.onclick = () => toggleSignedIn();

        const primaryNavAction = document.getElementById('primaryNavAction');
        primaryNavAction.textContent = state.signedIn ? 'Scan Card' : 'Scan a Card';
        primaryNavAction.onclick = () => {
          state.route = 'scan';
          render();
        };

        document.getElementById('app').innerHTML = renderers[state.route]();
        bindEvents();
      }

      hydrateLiveData().finally(render);
    </script>
  </body>
</html>
