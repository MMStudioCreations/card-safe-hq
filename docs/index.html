<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Card Vault AI • Scan, Grade, Collect</title>
    <style>
      :root {
        color-scheme: dark;
        --space-1: 0.4rem;
        --space-2: 0.7rem;
        --space-3: 1rem;
        --space-4: 1.35rem;
        --space-5: 1.8rem;
        --radius-sm: 0.8rem;
        --radius-md: 1rem;
        --radius-lg: 1.35rem;
        --radius-xl: 1.7rem;

        --bg: #060a17;
        --bg-soft: #0f1730;
        --surface: linear-gradient(180deg, rgba(19, 29, 57, 0.95), rgba(11, 18, 36, 0.95));
        --surface-strong: linear-gradient(160deg, rgba(24, 36, 70, 0.95), rgba(10, 18, 38, 0.95));
        --surface-overlay: rgba(13, 20, 39, 0.82);
        --border: rgba(144, 173, 255, 0.3);
        --border-soft: rgba(125, 154, 240, 0.18);
        --text: #eef3ff;
        --muted: #b0bfdf;
        --accent: #7488ff;
        --accent-2: #45dfff;
        --good: #6cf0b2;
        --warn: #ffcf74;

        --shadow-lg: 0 28px 72px rgba(3, 8, 24, 0.6);
        --shadow-md: 0 16px 40px rgba(4, 10, 27, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% -8%, rgba(88, 109, 217, 0.42) 0%, transparent 40%),
          radial-gradient(circle at 93% -12%, rgba(41, 181, 225, 0.35) 0%, transparent 34%),
          linear-gradient(180deg, #070b1a 0%, #070e21 48%, #050916 100%);
      }

      a,
      button {
        color: inherit;
        font: inherit;
      }

      .app-shell {
        max-width: 1160px;
        margin: 0 auto;
        min-height: 100vh;
        padding: calc(env(safe-area-inset-top, 0px) + var(--space-2)) var(--space-3)
          calc(env(safe-area-inset-bottom, 0px) + 5.1rem);
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
      }

      .top-nav {
        position: sticky;
        top: calc(env(safe-area-inset-top, 0px));
        z-index: 20;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border-soft);
        background: rgba(7, 13, 28, 0.82);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow-md);
      }

      .top-nav-inner {
        padding: 0.75rem 0.85rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-2);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.62rem;
      }

      .brand-mark {
        width: 2.1rem;
        height: 2.1rem;
        border-radius: 0.7rem;
        background: linear-gradient(140deg, var(--accent), var(--accent-2));
        box-shadow: 0 8px 24px rgba(100, 128, 255, 0.56);
      }

      .brand-title {
        margin: 0;
        font-size: 0.98rem;
        letter-spacing: 0.01em;
      }

      .muted {
        color: var(--muted);
      }

      .nav-strip {
        display: none;
        gap: 0.35rem;
        flex-wrap: wrap;
      }

      .app-content {
        width: 100%;
        display: grid;
        gap: var(--space-3);
      }

      .surface {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: var(--surface);
        box-shadow: var(--shadow-md);
      }

      .surface-strong {
        background: var(--surface-strong);
      }

      .section {
        padding: var(--space-4);
      }

      .kicker {
        margin: 0;
        color: #cce9ff;
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 700;
      }

      h1,
      h2,
      h3,
      h4,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.95rem, 7vw, 3.45rem);
        line-height: 1.05;
      }

      h2 {
        font-size: clamp(1.4rem, 5vw, 2.3rem);
      }

      h3 {
        font-size: 1.06rem;
      }

      p {
        line-height: 1.55;
      }

      .button,
      .chip-btn {
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 0.62rem 0.95rem;
        cursor: pointer;
        transition: 180ms ease;
      }

      .button {
        background: linear-gradient(140deg, #8a98ff 0%, #6a68ff 40%, #39d2f8 100%);
        color: #f7f9ff;
        font-weight: 700;
      }

      .button:hover,
      .button:focus-visible {
        transform: translateY(-1px);
        box-shadow: 0 14px 22px rgba(58, 108, 255, 0.35);
      }

      .button.secondary {
        background: rgba(137, 161, 255, 0.07);
        border-color: var(--border);
        color: #e8efff;
      }

      .button.ghost {
        background: transparent;
        border-color: var(--border-soft);
        color: var(--muted);
      }

      .chip-btn {
        border-color: var(--border-soft);
        background: rgba(157, 178, 255, 0.08);
        color: #dbe5ff;
        font-size: 0.83rem;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
      }

      .stack {
        display: grid;
        gap: var(--space-2);
      }

      .hero-layout,
      .two-col,
      .scan-layout,
      .auth-layout,
      .dashboard-layout,
      .detail-layout {
        display: grid;
        gap: var(--space-3);
      }

      .cta-row,
      .toolbar {
        display: flex;
        gap: 0.52rem;
        flex-wrap: wrap;
      }

      .tile-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--space-2);
      }

      .tile,
      .list-item {
        border: 1px solid var(--border-soft);
        background: rgba(15, 24, 47, 0.72);
        border-radius: var(--radius-md);
      }

      .tile {
        padding: var(--space-3);
        transition: 200ms ease;
      }

      .tile:hover {
        border-color: rgba(79, 218, 255, 0.45);
        transform: translateY(-2px);
      }

      .list-item {
        padding: 0.86rem 0.95rem;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        border: 1px solid rgba(108, 240, 178, 0.32);
        border-radius: 999px;
        color: var(--good);
        background: rgba(108, 240, 178, 0.11);
        font-size: 0.72rem;
        padding: 0.24rem 0.55rem;
      }

      .pill.warn {
        color: var(--warn);
        border-color: rgba(255, 207, 116, 0.37);
        background: rgba(255, 207, 116, 0.1);
      }

      .phone-preview {
        border-radius: 1.9rem;
        border: 1px solid rgba(166, 184, 255, 0.35);
        padding: 0.9rem;
        background: linear-gradient(170deg, rgba(21, 33, 66, 0.95), rgba(9, 16, 35, 0.95));
        box-shadow: inset 0 0 0 1px rgba(170, 188, 255, 0.12), var(--shadow-md);
      }

      .phone-notch {
        width: 36%;
        height: 0.36rem;
        border-radius: 999px;
        background: rgba(226, 236, 255, 0.25);
        margin: 0 auto 0.95rem;
      }

      .preview-card {
        border: 1px solid rgba(143, 174, 255, 0.23);
        border-radius: var(--radius-md);
        padding: 0.78rem;
        background: rgba(10, 17, 35, 0.7);
      }

      .stat-value {
        font-size: 1.55rem;
        font-weight: 750;
      }

      .input,
      select,
      textarea {
        width: 100%;
        color: var(--text);
        background: rgba(8, 14, 31, 0.85);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.7rem 0.8rem;
      }

      .scan-stage {
        border: 1px solid rgba(96, 215, 255, 0.45);
        border-radius: 1.25rem;
        padding: 1rem;
        background: radial-gradient(circle at 60% -20%, rgba(48, 220, 255, 0.17), transparent 60%),
          rgba(7, 13, 28, 0.86);
      }

      .camera-view {
        min-height: 260px;
        border-radius: 1.05rem;
        border: 1px dashed rgba(102, 221, 255, 0.58);
        background: linear-gradient(180deg, rgba(20, 31, 61, 0.5), rgba(8, 14, 30, 0.9));
        display: grid;
        place-items: center;
        text-align: center;
        padding: 0.8rem;
      }

      .guide-frame {
        border-radius: 0.9rem;
        border: 2px solid rgba(102, 221, 255, 0.62);
        width: min(250px, 84%);
        min-height: 170px;
        display: grid;
        place-items: center;
        padding: 0.6rem;
      }

      .card-art {
        min-height: 170px;
        border-radius: 0.95rem;
        background: linear-gradient(165deg, rgba(81, 126, 255, 0.42), rgba(44, 200, 245, 0.18) 45%, rgba(9, 15, 33, 0.9));
        border: 1px solid rgba(156, 181, 255, 0.3);
        display: grid;
        place-items: center;
        text-align: center;
        padding: 0.8rem;
      }

      .bottom-nav {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 0.65rem);
        left: 50%;
        transform: translateX(-50%);
        width: min(560px, calc(100vw - 1rem));
        border: 1px solid var(--border-soft);
        border-radius: 1.15rem;
        background: rgba(8, 14, 31, 0.92);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow-lg);
        display: flex;
        gap: 0.28rem;
        padding: 0.42rem;
        z-index: 40;
      }

      .tab-link {
        flex: 1;
        padding: 0.58rem 0.45rem;
        border-radius: 0.85rem;
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
        text-align: center;
        font-size: 0.8rem;
      }

      .tab-link.active,
      .tab-link:hover {
        color: #f3f7ff;
        border-color: rgba(138, 164, 255, 0.35);
        background: rgba(112, 132, 255, 0.18);
      }

      .footer-note {
        text-align: center;
        color: #90a4d3;
        font-size: 0.84rem;
        margin-top: auto;
      }

      @media (min-width: 860px) {
        .app-shell {
          padding-bottom: 1.2rem;
        }

        .nav-strip {
          display: flex;
        }

        .top-nav-inner {
          padding: 0.85rem 1rem;
        }

        .hero-layout {
          grid-template-columns: 1.05fr 0.95fr;
          align-items: center;
        }

        .dashboard-layout,
        .scan-layout,
        .detail-layout,
        .auth-layout {
          grid-template-columns: 1.2fr 0.8fr;
        }

        .two-col {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .tile-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .bottom-nav {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="top-nav">
        <div class="top-nav-inner">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true"></div>
            <div>
              <h1 class="brand-title">Card Vault AI</h1>
              <p class="muted" style="font-size: 0.75rem">Collector vault intelligence</p>
            </div>
          </div>
          <nav class="nav-strip" id="desktopLinks"></nav>
          <div class="toolbar">
            <button class="button ghost" id="toggleAuth"></button>
            <button class="button" id="primaryNavAction">Scan</button>
          </div>
        </div>
      </header>

      <main id="app" class="app-content"></main>

      <footer class="footer-note">Card Vault AI • Scan instantly • Estimate before grading • Track your vault value.</footer>
    </div>

    <nav class="bottom-nav" id="mobileNav"></nav>

    <script>
      const CONFIG = {
        DEFAULT_WORKER_BASE_URL: 'https://your-worker-name.your-subdomain.workers.dev',
      };

      const state = {
        signedIn: false,
        route: 'home',
        workerUrl: (window.WORKER_BASE_URL || localStorage.getItem('CARD_VAULT_WORKER_URL') || CONFIG.DEFAULT_WORKER_BASE_URL).replace(/\/$/, ''),
      };

      const mock = {
        stats: [
          { label: 'Vault Value', value: '$18,460', trend: '+6.9% this month' },
          { label: 'Cards Logged', value: '248', trend: '14 scanned this week' },
          { label: 'PSA 9+ Potential', value: '72%', trend: 'from AI estimates' },
          { label: 'Watchlist Releases', value: '5', trend: '2 in next 30 days' },
        ],
        releases: [
          { game: 'Pokémon', name: 'Destined Rivals ETB', date: 'Apr 19', hype: 'High', focus: 'Chase trainer alts' },
          { game: 'NBA', name: 'Prizm Basketball Hobby', date: 'May 07', hype: 'Very High', focus: 'Rookie silver chase' },
          { game: 'One Piece', name: 'Royal Blood OP-11', date: 'May 24', hype: 'Rising', focus: 'Alt leader momentum' },
          { game: 'MTG', name: 'Modern Horizons Set', date: 'Jun 13', hype: 'Steady', focus: 'Long-term staples' },
        ],
        cards: [
          { id: 'cv-102', name: 'Charizard ex', set: 'Paldean Fates', num: '#054', value: '$192', grade: '9.1', note: 'Strong centering' },
          { id: 'cv-337', name: 'LeBron James Silver', set: 'Prizm 2024', num: '#17', value: '$435', grade: '8.7', note: 'Edges need review' },
          { id: 'cv-508', name: 'Monkey D. Luffy Alt Art', set: 'OP-09', num: '#001', value: '$289', grade: '9.3', note: 'High upside comp spread' },
          { id: 'cv-611', name: 'Jace, the Mind Sculptor', set: 'Masters', num: '#031', value: '$118', grade: '8.9', note: 'Surface light print line' },
        ],
        comps: [
          { source: 'eBay', price: '$205', when: '2 days ago' },
          { source: 'eBay', price: '$198', when: '5 days ago' },
          { source: 'PWCC', price: '$224', when: '1 week ago' },
        ],
      };

      const routes = {
        signedOut: ['home', 'scan', 'releases', 'auth'],
        signedIn: ['dashboard', 'scan', 'collection', 'releases', 'card'],
      };

      function navLabel(route) {
        return {
          home: 'Home',
          scan: 'Scan',
          releases: 'Releases',
          auth: 'Account',
          dashboard: 'Dashboard',
          collection: 'Collection',
          card: 'Card',
        }[route] || route;
      }

      function displayRoute(route) {
        const available = state.signedIn ? routes.signedIn : routes.signedOut;
        return available.includes(route) ? route : available[0];
      }

      function statusText() {
        if (!state.workerUrl || state.workerUrl.includes('your-worker-name.your-subdomain')) {
          return 'Worker API not configured — displaying premium mock flow for demo mode.';
        }
        return `Worker API configured: ${state.workerUrl}`;
      }

      async function getJson(path) {
        if (!state.workerUrl || state.workerUrl.includes('your-worker-name.your-subdomain')) return null;
        const response = await fetch(`${state.workerUrl}${path}`);
        const payload = await response.json();
        if (!response.ok || payload?.ok === false) {
          throw new Error(payload?.error || `Request failed (${response.status})`);
        }
        return payload;
      }

      function homePage() {
        return `
          <section class="surface section hero-layout">
            <div class="stack" style="gap: var(--space-3)">
              <p class="kicker">Mobile-first collector vault</p>
              <h1>Scan cards in seconds. Build a premium vault that tracks value in real time.</h1>
              <p class="muted">Card Vault AI helps collectors scan, identify, value, estimate grade, and organize cards in one cohesive experience that feels like a real app, not a spreadsheet.</p>
              <div class="cta-row">
                <button class="button" data-route="scan">Start Guest Scan</button>
                <button class="button secondary" data-route="auth">Create Free Account</button>
              </div>
              <div class="list-item row">
                <span class="muted">System status</span>
                <span style="font-size:0.84rem">${statusText()}</span>
              </div>
            </div>
            <div class="phone-preview stack">
              <div class="phone-notch"></div>
              <div class="preview-card stack">
                <div class="row"><strong>Scan Result</strong><span class="pill">AI 9.1</span></div>
                <div class="card-art"><strong>Charizard ex #054</strong><p class="muted">Paldean Fates • Est. $192</p></div>
                <div class="row"><span class="muted">7-day comp trend</span><strong style="color:var(--good)">+8.2%</strong></div>
              </div>
              <div class="preview-card row">
                <div>
                  <p class="muted" style="font-size:0.82rem">Next drop</p>
                  <strong>Destined Rivals ETB</strong>
                </div>
                <span class="pill warn">Apr 19</span>
              </div>
            </div>
          </section>

          <section class="surface section">
            <div class="row" style="margin-bottom: var(--space-2)">
              <h2>Why collectors keep Card Vault open</h2>
              <button class="chip-btn" data-route="scan">Try live scan flow</button>
            </div>
            <div class="tile-grid">
              <article class="tile"><h3>Scan instantly</h3><p class="muted">Front/back guidance and confidence scoring built for mobile camera sessions.</p></article>
              <article class="tile"><h3>Estimate before grading</h3><p class="muted">Get AI condition signals for corners, edges, surface, and centering before submission.</p></article>
              <article class="tile"><h3>Track market comps</h3><p class="muted">Monitor recent sold listings, trend direction, and value confidence bands.</p></article>
              <article class="tile"><h3>Organize your vault</h3><p class="muted">Save scans, group by game/set, and see collection value with return-ready context.</p></article>
            </div>
          </section>

          <section class="two-col">
            <article class="surface section stack">
              <h2>Built to convert visitors into active collectors</h2>
              <p class="muted">Guest mode removes friction. Account creation appears when collectors are ready to save scans, sync vault activity, and unlock value tracking dashboards.</p>
              <div class="cta-row">
                <button class="button" data-route="scan">Scan as Guest</button>
                <button class="button secondary" data-route="dashboard">Preview Dashboard</button>
              </div>
            </article>
            <article class="surface section stack">
              <div class="row"><h3>Upcoming releases</h3><button class="chip-btn" data-route="releases">Full calendar</button></div>
              ${mock.releases
                .slice(0, 3)
                .map(
                  (r) => `<div class="list-item"><div class="row"><strong>${r.name}</strong><span class="pill warn">${r.date}</span></div><p class="muted">${r.game} • ${r.focus}</p></div>`,
                )
                .join('')}
            </article>
          </section>
        `;
      }

      function scanPage() {
        return `
          <section class="scan-layout">
            <article class="surface surface-strong section stack">
              <p class="kicker">Core workflow</p>
              <h2>Scan front and back with camera-grade guidance</h2>
              <p class="muted">Guest scanning is fully enabled. Save to your vault when you are ready—no forced login wall before results.</p>
              <div class="scan-stage stack">
                <div class="row"><strong>Front Capture</strong><span class="pill">Live guide</span></div>
                <div class="camera-view"><div class="guide-frame"><div><strong>Align front of card</strong><p class="muted">Keep borders inside frame for best AI estimate</p></div></div></div>
                <div class="cta-row"><button class="button">Open Camera</button><button class="button secondary">Upload Front</button></div>
              </div>
              <div class="scan-stage stack">
                <div class="row"><strong>Back Capture</strong><span class="pill">Required</span></div>
                <div class="camera-view"><div class="guide-frame"><div><strong>Capture back surface</strong><p class="muted">Reduce glare and include all four corners</p></div></div></div>
                <div class="cta-row"><button class="button secondary">Upload Back</button><button class="button">Analyze Card</button></div>
              </div>
            </article>

            <aside class="stack">
              <article class="surface section stack">
                <div class="row"><h3>Analysis result</h3><span class="pill">Confidence 94%</span></div>
                <div class="card-art"><strong>Charizard ex • Paldean Fates #054</strong></div>
                <div class="list-item row"><span>AI Estimated Grade</span><strong>9.1</strong></div>
                <div class="list-item row"><span>Est. Market Value</span><strong>$192</strong></div>
                <div class="list-item row"><span>Grade Opportunity</span><strong style="color:var(--good)">Strong PSA 9 candidate</strong></div>
                <div class="cta-row"><button class="button" data-route="auth">Save to Vault</button><button class="button secondary" data-route="collection">View Vault</button></div>
                <p class="muted" style="font-size:0.84rem">Save prompts account creation elegantly after value and grade insights are revealed.</p>
              </article>
              <article class="surface section stack">
                <h3>Recent sold comps</h3>
                ${mock.comps.map((c) => `<div class="list-item row"><span>${c.source}</span><strong>${c.price}</strong><span class="muted">${c.when}</span></div>`).join('')}
              </article>
            </aside>
          </section>
        `;
      }

      function dashboardPage() {
        return `
          <section class="tile-grid">
            ${mock.stats
              .map(
                (s) => `<article class="tile"><p class="kicker">${s.label}</p><p class="stat-value">${s.value}</p><p class="muted">${s.trend}</p></article>`,
              )
              .join('')}
          </section>

          <section class="dashboard-layout">
            <article class="surface section stack">
              <div class="row"><h2>Vault activity</h2><button class="button" data-route="scan">Quick Scan</button></div>
              ${mock.cards
                .map(
                  (c) => `<div class="list-item row"><div><strong>${c.name}</strong><p class="muted">${c.set} • ${c.num} • ${c.note}</p></div><div style="text-align:right"><strong>${c.value}</strong><p class="muted">AI ${c.grade}</p></div></div>`,
                )
                .join('')}
            </article>
            <aside class="stack">
              <article class="surface section stack">
                <h3>Quick actions</h3>
                <button class="button" data-route="scan">Scan New Card</button>
                <button class="button secondary" data-route="collection">Open Vault Collection</button>
                <button class="button secondary" data-route="releases">Track Releases</button>
              </article>
              <article class="surface section stack">
                <h3>Comps pulse</h3>
                ${mock.comps.map((comp) => `<div class="list-item row"><span>${comp.source}</span><strong>${comp.price}</strong><span class="muted">${comp.when}</span></div>`).join('')}
              </article>
            </aside>
          </section>
        `;
      }

      function collectionPage() {
        return `
          <section class="surface section stack">
            <div class="row" style="flex-wrap:wrap">
              <h2>Your Card Vault</h2>
              <div class="toolbar">
                <button class="chip-btn">Grid</button>
                <button class="chip-btn">List</button>
              </div>
            </div>
            <div class="toolbar">
              <input class="input" style="max-width:340px" placeholder="Search cards, sets, players" />
              <select><option>All Games</option><option>Pokémon</option><option>NBA</option><option>One Piece</option></select>
              <select><option>Sort: Value</option><option>Sort: Grade</option><option>Sort: Recently Added</option></select>
            </div>
            <section class="tile-grid">
              ${mock.cards
                .map(
                  (c) => `<article class="tile stack"><div class="card-art"><strong>${c.name}</strong><p class="muted">${c.set}</p></div><div><strong>${c.name}</strong><p class="muted">${c.set} • ${c.num}</p></div><div class="row"><span>Est. value</span><strong>${c.value}</strong></div><div class="row"><span>AI grade</span><strong>${c.grade}</strong></div><button class="button secondary" data-route="card">Open Detail</button></article>`,
                )
                .join('')}
            </section>
          </section>

          <section class="surface section stack">
            <h3>Empty state quality check</h3>
            <div class="list-item" style="text-align:center; padding:1.1rem"><strong>No cards match this filter.</strong><p class="muted">Try another set, clear filters, or run a new scan to keep the vault growing.</p><button class="button" data-route="scan">Scan next card</button></div>
          </section>
        `;
      }

      function cardDetailPage() {
        const c = mock.cards[0];
        return `
          <section class="detail-layout">
            <article class="surface section stack">
              <div class="row"><h2>${c.name}</h2><span class="pill">${c.set}</span></div>
              <p class="muted">Card ${c.num} • Updated 2h ago • Vault ID ${c.id}</p>
              <div class="two-col">
                <div class="card-art">Front image</div>
                <div class="card-art">Back image</div>
              </div>
              <div class="cta-row"><button class="button secondary">Replace Front</button><button class="button secondary">Replace Back</button></div>
              <article class="tile stack">
                <h3>Collector notes</h3>
                <textarea rows="4" placeholder="Centering looks strong. Slight whitening top-right back corner."></textarea>
              </article>
            </article>
            <aside class="stack">
              <article class="surface section stack">
                <h3>AI Grade Module</h3>
                <p class="stat-value">${c.grade}</p>
                <p class="muted">Confidence 88% • Likely PSA 9 range if surface stays clean.</p>
                <div class="list-item row"><span>Corners</span><strong>8.8</strong></div>
                <div class="list-item row"><span>Edges</span><strong>9.0</strong></div>
                <div class="list-item row"><span>Surface</span><strong>9.3</strong></div>
                <div class="list-item row"><span>Centering</span><strong>9.2</strong></div>
              </article>
              <article class="surface section stack">
                <h3>Comps & market</h3>
                ${mock.comps.map((comp) => `<div class="list-item row"><span>${comp.source}</span><strong>${comp.price}</strong><span class="muted">${comp.when}</span></div>`).join('')}
              </article>
              <article class="surface section stack">
                <button class="button">Update Vault Entry</button>
                <button class="button secondary">Mark for Grading Submission</button>
              </article>
            </aside>
          </section>
        `;
      }

      function authPage() {
        return `
          <section class="auth-layout">
            <article class="surface surface-strong section stack">
              <p class="kicker">Collector access</p>
              <h2>Sign in and keep every scan in your vault</h2>
              <p class="muted">Create an account to sync scans, value history, notes, and release tracking across sessions.</p>
              <div class="stack">
                <label>Email<input class="input" type="email" placeholder="collector@email.com" /></label>
                <label>Password<input class="input" type="password" placeholder="••••••••" /></label>
              </div>
              <div class="cta-row">
                <button class="button" id="loginBtn">Sign In</button>
                <button class="button secondary" id="signupBtn">Create Account</button>
                <button class="button ghost" data-route="scan">Continue as Guest</button>
              </div>
            </article>
            <article class="surface section stack">
              <h3>What unlocks with an account</h3>
              <div class="tile"><strong>Persistent vault</strong><p class="muted">Every scan and note saved, organized, and searchable.</p></div>
              <div class="tile"><strong>Market follow tools</strong><p class="muted">Track comp moves and spot price momentum faster.</p></div>
              <div class="tile"><strong>Release watchlist</strong><p class="muted">Follow upcoming drops that fit your collector strategy.</p></div>
            </article>
          </section>
        `;
      }

      function releasesPage() {
        return `
          <section class="surface section stack">
            <div class="row" style="flex-wrap:wrap">
              <h2>Release Calendar</h2>
              <div class="toolbar">
                <select><option>All Games</option><option>Pokémon</option><option>NBA</option><option>One Piece</option><option>MTG</option></select>
                <select><option>All Types</option><option>ETB</option><option>Booster Box</option><option>Hobby</option></select>
              </div>
            </div>
            <p class="muted">Stay ahead of high-interest drops and align scan + buy strategy with market timing.</p>
            <div class="two-col">
              ${mock.releases
                .map(
                  (r) => `<article class="tile stack"><div class="row"><p class="kicker">${r.game}</p><span class="pill warn">${r.hype}</span></div><h3>${r.name}</h3><p class="muted">Release ${r.date}</p><p>${r.focus}</p><button class="button secondary">Add to Watchlist</button></article>`,
                )
                .join('')}
            </div>
          </section>
        `;
      }

      const renderers = {
        home: homePage,
        scan: scanPage,
        dashboard: dashboardPage,
        collection: collectionPage,
        card: cardDetailPage,
        auth: authPage,
        releases: releasesPage,
      };

      function bindEvents() {
        document.querySelectorAll('[data-route]').forEach((el) => {
          el.addEventListener('click', () => {
            state.route = displayRoute(el.dataset.route);
            render();
          });
        });

        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        if (loginBtn) loginBtn.addEventListener('click', () => toggleSignedIn(true));
        if (signupBtn) signupBtn.addEventListener('click', () => toggleSignedIn(true));
      }

      function buildLinkMarkup(route) {
        return `<button class="tab-link ${state.route === route ? 'active' : ''}" data-route="${route}">${navLabel(route)}</button>`;
      }

      function buildNav() {
        const available = state.signedIn ? routes.signedIn : routes.signedOut;
        document.getElementById('desktopLinks').innerHTML = available.map(buildLinkMarkup).join('');
        document.getElementById('mobileNav').innerHTML = available.map(buildLinkMarkup).join('');
      }

      function toggleSignedIn(force) {
        state.signedIn = typeof force === 'boolean' ? force : !state.signedIn;
        state.route = state.signedIn ? 'dashboard' : 'home';
        render();
      }

      async function hydrateLiveData() {
        try {
          const [health, cards] = await Promise.all([getJson('/api/health'), getJson('/api/cards')]);
          if (health?.ok) mock.stats[1].trend = 'Live API connected';
          if (Array.isArray(cards?.cards) && cards.cards.length) {
            mock.cards = cards.cards.slice(0, 4).map((card, idx) => ({
              id: card.id || `live-${idx}`,
              name: card.name || 'Unknown Card',
              set: card.set_name || card.set || 'Unknown Set',
              num: card.card_number ? `#${card.card_number}` : '#--',
              value: card.estimated_value_usd ? `$${card.estimated_value_usd}` : '$--',
              grade: card.ai_grade_estimate ? String(card.ai_grade_estimate) : '—',
              note: 'Imported from Worker API',
            }));
          }
        } catch {
          /* demo mode */
        }
      }

      function render() {
        state.route = displayRoute(state.route);
        buildNav();

        const toggleAuth = document.getElementById('toggleAuth');
        toggleAuth.textContent = state.signedIn ? 'Sign out' : 'Sign in';
        toggleAuth.onclick = () => toggleSignedIn();

        const primaryAction = document.getElementById('primaryNavAction');
        primaryAction.textContent = state.signedIn ? 'Scan card' : 'Scan now';
        primaryAction.onclick = () => {
          state.route = 'scan';
          render();
        };

        document.getElementById('app').innerHTML = renderers[state.route]();
        bindEvents();
      }

      hydrateLiveData().finally(render);
    </script>
  </body>
</html>
