<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Card Vault AI • Mobile Collector Vault</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #060916;
        --bg-2: #0a1226;
        --surface: rgba(14, 23, 44, 0.86);
        --surface-strong: rgba(19, 29, 54, 0.96);
        --border: rgba(133, 165, 255, 0.24);
        --text: #eef3ff;
        --muted: #9eafda;
        --primary: #7a86ff;
        --secondary: #3dd9ff;
        --good: #6ef0bb;
        --warn: #ffcf7c;
        --danger: #ff8ba2;

        --radius-sm: 0.8rem;
        --radius-md: 1.05rem;
        --radius-lg: 1.45rem;
        --radius-xl: 1.9rem;

        --space-1: 0.4rem;
        --space-2: 0.7rem;
        --space-3: 1rem;
        --space-4: 1.3rem;
        --space-5: 1.8rem;

        --shadow-1: 0 18px 42px rgba(2, 8, 24, 0.42);
        --shadow-2: 0 26px 72px rgba(2, 7, 22, 0.56);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 18% -10%, rgba(92, 118, 255, 0.5) 0%, transparent 36%),
          radial-gradient(circle at 90% -10%, rgba(52, 220, 255, 0.34) 0%, transparent 32%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 45%, #050812 100%);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
        color: inherit;
      }

      .app {
        max-width: 980px;
        margin: 0 auto;
        min-height: 100vh;
        padding: calc(env(safe-area-inset-top, 0px) + 0.7rem) 0.8rem calc(env(safe-area-inset-bottom, 0px) + 5.1rem);
        display: grid;
        gap: 0.9rem;
      }

      .topbar {
        position: sticky;
        top: env(safe-area-inset-top, 0px);
        z-index: 30;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: rgba(8, 14, 30, 0.78);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow-1);
      }

      .topbar-inner {
        padding: 0.75rem 0.85rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.55rem;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .brand-mark {
        width: 2.1rem;
        aspect-ratio: 1;
        border-radius: 0.72rem;
        background: linear-gradient(155deg, var(--primary), var(--secondary));
        box-shadow: 0 10px 26px rgba(108, 139, 255, 0.42);
      }

      .brand h1 {
        font-size: 0.98rem;
        margin: 0;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 0.76rem;
      }

      .app-btn,
      .chip,
      .tab {
        border: 1px solid transparent;
        border-radius: 999px;
        cursor: pointer;
        transition: 180ms ease;
      }

      .app-btn {
        padding: 0.6rem 0.95rem;
        font-weight: 700;
        background: linear-gradient(150deg, #8c96ff 0%, #6d6eff 45%, #42d6ff 100%);
        color: #f8fbff;
      }

      .app-btn.secondary {
        background: rgba(124, 153, 255, 0.11);
        border-color: var(--border);
        color: #e8eeff;
      }

      .app-btn.ghost {
        background: transparent;
        border-color: rgba(131, 161, 255, 0.2);
        color: var(--muted);
      }

      .app-btn:hover,
      .app-btn:focus-visible,
      .tab:hover {
        transform: translateY(-1px);
      }

      .screen {
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background: linear-gradient(180deg, rgba(18, 28, 54, 0.94), rgba(10, 17, 34, 0.96));
        box-shadow: var(--shadow-2);
        padding: var(--space-4);
        display: grid;
        gap: var(--space-3);
        animation: reveal 220ms ease;
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.99);
        }
      }

      .kicker {
        font-size: 0.74rem;
        color: #cde6ff;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin: 0;
        font-weight: 700;
      }

      h2,
      h3,
      h4,
      p {
        margin: 0;
      }

      h2 {
        font-size: clamp(1.45rem, 7vw, 2.45rem);
        line-height: 1.08;
      }

      .muted {
        color: var(--muted);
      }

      .stack {
        display: grid;
        gap: var(--space-2);
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.6rem;
      }

      .cta-row,
      .toolbar {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .surface {
        border: 1px solid rgba(135, 164, 255, 0.2);
        border-radius: var(--radius-md);
        background: var(--surface);
        padding: var(--space-3);
      }

      .hero-preview {
        border-radius: 1.35rem;
        border: 1px solid rgba(142, 171, 255, 0.32);
        background: linear-gradient(165deg, rgba(22, 34, 65, 0.96), rgba(10, 16, 31, 0.96));
        padding: 0.8rem;
      }

      .hero-phone {
        border-radius: 1rem;
        border: 1px solid rgba(126, 161, 255, 0.32);
        background: rgba(9, 15, 30, 0.9);
        padding: 0.7rem;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.55rem;
      }

      .stat-value {
        font-size: 1.35rem;
        font-weight: 740;
      }

      .tile-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.55rem;
      }

      .tile {
        border: 1px solid rgba(129, 160, 255, 0.2);
        border-radius: var(--radius-md);
        background: rgba(12, 20, 38, 0.9);
        padding: 0.8rem;
      }

      .badge {
        display: inline-flex;
        padding: 0.22rem 0.55rem;
        border-radius: 999px;
        border: 1px solid rgba(111, 239, 188, 0.35);
        background: rgba(111, 239, 188, 0.12);
        color: var(--good);
        font-size: 0.73rem;
      }

      .badge.warn {
        color: var(--warn);
        background: rgba(255, 207, 124, 0.12);
        border-color: rgba(255, 207, 124, 0.35);
      }

      .field {
        display: grid;
        gap: 0.38rem;
        font-size: 0.9rem;
      }

      .input,
      .select,
      textarea {
        width: 100%;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: rgba(9, 14, 28, 0.92);
        padding: 0.68rem 0.75rem;
      }

      .scan-frame {
        border-radius: 1.1rem;
        border: 2px dashed rgba(88, 220, 255, 0.58);
        min-height: 170px;
        background: radial-gradient(circle at 50% -30%, rgba(72, 222, 255, 0.2), transparent 56%), rgba(7, 12, 25, 0.82);
        display: grid;
        place-items: center;
        text-align: center;
        padding: 0.8rem;
      }

      .scan-grid,
      .detail-grid,
      .home-grid,
      .auth-grid,
      .dashboard-grid {
        display: grid;
        gap: 0.7rem;
      }

      .card-image {
        min-height: 180px;
        border-radius: 0.9rem;
        border: 1px solid rgba(137, 169, 255, 0.24);
        background: linear-gradient(165deg, rgba(88, 126, 255, 0.34), rgba(54, 220, 255, 0.2), rgba(8, 14, 28, 0.92));
        display: grid;
        place-items: center;
        text-align: center;
      }

      .bottom-nav {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 0.65rem);
        left: 50%;
        transform: translateX(-50%);
        z-index: 35;
        width: min(620px, calc(100vw - 0.95rem));
        border: 1px solid rgba(128, 159, 255, 0.22);
        border-radius: 1.05rem;
        background: rgba(7, 12, 26, 0.92);
        backdrop-filter: blur(14px);
        display: flex;
        gap: 0.32rem;
        padding: 0.42rem;
        box-shadow: var(--shadow-2);
      }

      .tab {
        flex: 1;
        border-radius: 0.8rem;
        padding: 0.56rem 0.38rem;
        background: transparent;
        color: var(--muted);
        border-color: transparent;
        font-size: 0.78rem;
      }

      .tab.active {
        color: #f5f8ff;
        border-color: rgba(131, 163, 255, 0.34);
        background: rgba(113, 138, 255, 0.17);
      }

      .desktop-tabs {
        display: none;
        gap: 0.35rem;
        flex-wrap: wrap;
      }

      .list {
        display: grid;
        gap: 0.5rem;
      }

      .list-item {
        border: 1px solid rgba(133, 164, 255, 0.2);
        border-radius: 0.92rem;
        background: rgba(12, 19, 36, 0.86);
        padding: 0.72rem 0.78rem;
      }

      @media (min-width: 860px) {
        .app {
          padding-bottom: 1rem;
        }

        .home-grid {
          grid-template-columns: 1.08fr 0.92fr;
          align-items: center;
        }

        .scan-grid,
        .dashboard-grid,
        .detail-grid,
        .auth-grid {
          grid-template-columns: 1.15fr 0.85fr;
        }

        .desktop-tabs {
          display: flex;
        }

        .bottom-nav {
          display: none;
        }

        .tile-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .stat-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true"></div>
            <div>
              <h1>Card Vault AI</h1>
              <p class="sub">Premium mobile collector vault</p>
            </div>
          </div>
          <nav id="desktopTabs" class="desktop-tabs"></nav>
          <div class="toolbar">
            <button id="authToggle" class="app-btn ghost">Sign in</button>
            <button id="scanQuick" class="app-btn">Scan Card</button>
          </div>
        </div>
      </header>

      <main id="screen"></main>
    </div>

    <nav id="mobileTabs" class="bottom-nav"></nav>

    <script>
      const state = {
        route: 'home',
        signedIn: false,
        scanReady: false,
        scanBackReady: false,
        scanAnalyzed: false,
        collectionView: 'grid',
        search: '',
        gameFilter: 'All',
      };

      const mock = {
        stats: [
          { label: 'Total Cards', value: '248', trend: '+14 this week' },
          { label: 'Collection Value', value: '$18,460', trend: '+6.9% / 30d' },
          { label: 'Recent Scans', value: '12', trend: '2 pending save' },
          { label: 'Upcoming Drops', value: '5', trend: '2 this month' },
        ],
        cards: [
          { id: 'cv-102', game: 'Pokémon', name: 'Charizard ex', set: 'Paldean Fates', value: 192, grade: 9.1 },
          { id: 'cv-337', game: 'NBA', name: 'LeBron James Silver', set: 'Prizm 2024', value: 435, grade: 8.7 },
          { id: 'cv-508', game: 'One Piece', name: 'Monkey D. Luffy Alt Art', set: 'OP-09', value: 289, grade: 9.3 },
          { id: 'cv-611', game: 'MTG', name: 'Jace, the Mind Sculptor', set: 'Masters', value: 118, grade: 8.9 },
          { id: 'cv-712', game: 'Pokémon', name: 'Mew ex SIR', set: '151', value: 129, grade: 9.0 },
          { id: 'cv-714', game: 'NBA', name: 'Wembanyama RC', set: 'Prizm Draft', value: 267, grade: 8.8 },
        ],
        releases: [
          { game: 'Pokémon', type: 'ETB', name: 'Destined Rivals ETB', date: 'Apr 19, 2026', hype: 'High' },
          { game: 'NBA', type: 'Hobby', name: 'Prizm Basketball Hobby', date: 'May 07, 2026', hype: 'Very High' },
          { game: 'One Piece', type: 'Booster', name: 'Royal Blood OP-11', date: 'May 24, 2026', hype: 'Rising' },
          { game: 'MTG', type: 'Set', name: 'Modern Horizons', date: 'Jun 13, 2026', hype: 'Steady' },
        ],
        comps: [
          { source: 'eBay', price: '$205', date: '2d ago' },
          { source: 'eBay', price: '$198', date: '5d ago' },
          { source: 'PWCC', price: '$224', date: '1w ago' },
        ],
      };

      const routes = {
        guest: ['home', 'scan', 'collection', 'releases', 'auth'],
        member: ['dashboard', 'scan', 'collection', 'releases', 'card'],
      };

      const routeLabel = {
        home: 'Home',
        scan: 'Scan',
        collection: 'Collection',
        releases: 'Releases',
        auth: 'Account',
        dashboard: 'Dashboard',
        card: 'Card',
      };

      const visibleRoute = (r) => (activeRoutes().includes(r) ? r : activeRoutes()[0]);
      const activeRoutes = () => (state.signedIn ? routes.member : routes.guest);

      function renderHome() {
        return `
          <section class="screen stack">
            <div class="home-grid">
              <div class="stack">
                <p class="kicker">Mobile-first collector app</p>
                <h2>Scan, grade, and grow your card vault like a modern app.</h2>
                <p class="muted">Card Vault AI gives collectors instant scan workflows, AI condition estimates, recent sold comps, and a premium vault dashboard that feels fast on iPhone Safari.</p>
                <div class="cta-row">
                  <button class="app-btn" data-route="scan">Scan a Card</button>
                  <button class="app-btn secondary" data-route="collection">Explore the Vault</button>
                </div>
              </div>
              <div class="hero-preview stack">
                <div class="hero-phone stack">
                  <div class="row"><strong>Scan Result</strong><span class="badge">AI 9.1</span></div>
                  <div class="card-image"><div><strong>Charizard ex</strong><p class="muted">Paldean Fates • $192</p></div></div>
                  <div class="row"><span class="muted">7-day trend</span><strong style="color:var(--good)">+8.2%</strong></div>
                </div>
              </div>
            </div>
            <div class="tile-grid">
              <article class="tile"><h4>Scan-first workflow</h4><p class="muted">Front/back capture, fast analyze flow, instant confidence score.</p></article>
              <article class="tile"><h4>AI Estimated Grade</h4><p class="muted">Corners, edges, surface, and centering rolled into one estimate.</p></article>
              <article class="tile"><h4>Recent Sold Comps</h4><p class="muted">Quick comps to price intelligently before buying or grading.</p></article>
              <article class="tile"><h4>Vault Dashboard</h4><p class="muted">Track value, additions, releases, and scanning momentum daily.</p></article>
            </div>
          </section>`;
      }

      function renderScan() {
        const canAnalyze = state.scanReady && state.scanBackReady;
        return `
          <section class="screen scan-grid">
            <article class="stack">
              <p class="kicker">Scan studio</p>
              <h3>Camera-first card analysis</h3>
              <p class="muted">Upload front and back photos to identify cards and get AI Estimated Grade + sold price comps. Guest scan works immediately.</p>

              <div class="surface stack">
                <div class="row"><strong>Front image</strong><span class="badge ${state.scanReady ? '' : 'warn'}">${state.scanReady ? 'Ready' : 'Required'}</span></div>
                <div class="scan-frame"><div><strong>Align card front inside frame</strong><p class="muted">Keep borders visible for stronger identification.</p></div></div>
                <div class="cta-row">
                  <button class="app-btn secondary" id="frontUpload">Upload Front</button>
                </div>
              </div>

              <div class="surface stack">
                <div class="row"><strong>Back image</strong><span class="badge ${state.scanBackReady ? '' : 'warn'}">${state.scanBackReady ? 'Ready' : 'Required'}</span></div>
                <div class="scan-frame"><div><strong>Capture card back & corners</strong><p class="muted">Avoid glare and include the full card.</p></div></div>
                <div class="cta-row">
                  <button class="app-btn secondary" id="backUpload">Upload Back</button>
                  <button class="app-btn ${canAnalyze ? '' : 'ghost'}" id="analyzeBtn" ${canAnalyze ? '' : 'disabled'}>Analyze Card</button>
                </div>
              </div>
            </article>

            <aside class="stack">
              <article class="surface stack">
                <div class="row"><h4>Analysis Result</h4><span class="badge">Confidence 94%</span></div>
                <div class="card-image"><div><strong>${state.scanAnalyzed ? 'Charizard ex' : 'Awaiting scan'}</strong><p class="muted">${state.scanAnalyzed ? 'Paldean Fates #054' : 'Upload both sides to analyze'}</p></div></div>
                <div class="list">
                  <div class="list-item row"><span>Detected card</span><strong>${state.scanAnalyzed ? 'Charizard ex' : '—'}</strong></div>
                  <div class="list-item row"><span>Set name</span><strong>${state.scanAnalyzed ? 'Paldean Fates' : '—'}</strong></div>
                  <div class="list-item row"><span>AI Estimated Grade</span><strong>${state.scanAnalyzed ? '9.1' : '—'}</strong></div>
                  <div class="list-item row"><span>Recent sold prices</span><strong>${state.scanAnalyzed ? '$198–$224' : '—'}</strong></div>
                </div>
                <button class="app-btn" data-route="auth">Save to Collection</button>
              </article>
            </aside>
          </section>`;
      }

      function renderDashboard() {
        return `
          <section class="screen stack">
            <div class="row"><h3>Collector Dashboard</h3><button class="app-btn" data-route="scan">Quick Scan</button></div>
            <div class="stat-grid">
              ${mock.stats
                .map((s) => `<article class="tile"><p class="kicker">${s.label}</p><p class="stat-value">${s.value}</p><p class="muted">${s.trend}</p></article>`)
                .join('')}
            </div>
            <div class="dashboard-grid">
              <article class="surface stack">
                <div class="row"><strong>Recent additions</strong><span class="muted">Today</span></div>
                <div class="list">
                  ${mock.cards
                    .slice(0, 4)
                    .map((c) => `<div class="list-item row"><div><strong>${c.name}</strong><p class="muted">${c.set}</p></div><div style="text-align:right"><strong>$${c.value}</strong><p class="muted">AI ${c.grade}</p></div></div>`)
                    .join('')}
                </div>
              </article>
              <aside class="stack">
                <article class="surface stack">
                  <strong>Upcoming releases</strong>
                  ${mock.releases.slice(0, 3).map((r) => `<div class="list-item row"><span>${r.name}</span><span class="badge warn">${r.date}</span></div>`).join('')}
                </article>
              </aside>
            </div>
          </section>`;
      }

      function filteredCards() {
        return mock.cards.filter((c) => {
          const gameOk = state.gameFilter === 'All' || c.game === state.gameFilter;
          const q = state.search.trim().toLowerCase();
          const searchOk = !q || `${c.name} ${c.set} ${c.game}`.toLowerCase().includes(q);
          return gameOk && searchOk;
        });
      }

      function renderCollection() {
        const cards = filteredCards();
        return `
          <section class="screen stack">
            <div class="row" style="flex-wrap:wrap"><h3>Your Collection</h3><div class="toolbar"><button id="gridMode" class="chip tab ${state.collectionView === 'grid' ? 'active' : ''}">Grid</button><button id="listMode" class="chip tab ${state.collectionView === 'list' ? 'active' : ''}">List</button></div></div>
            <div class="toolbar">
              <input id="searchInput" class="input" placeholder="Search cards, sets, games" value="${state.search}" />
              <button class="chip tab ${state.gameFilter === 'All' ? 'active' : ''}" data-game="All">All</button>
              <button class="chip tab ${state.gameFilter === 'Pokémon' ? 'active' : ''}" data-game="Pokémon">Pokémon</button>
              <button class="chip tab ${state.gameFilter === 'NBA' ? 'active' : ''}" data-game="NBA">NBA</button>
              <button class="chip tab ${state.gameFilter === 'One Piece' ? 'active' : ''}" data-game="One Piece">One Piece</button>
            </div>
            <div class="${state.collectionView === 'grid' ? 'tile-grid' : 'list'}">
              ${cards
                .map(
                  (c) => `<article class="${state.collectionView === 'grid' ? 'tile' : 'list-item'} stack"><div class="card-image"><strong>${c.name}</strong></div><div class="row"><div><strong>${c.name}</strong><p class="muted">${c.set}</p></div><div style="text-align:right"><strong>$${c.value}</strong><p class="muted">AI ${c.grade}</p></div></div><button class="app-btn secondary" data-route="card">Open Detail</button></article>`,
                )
                .join('')}
            </div>
            ${cards.length === 0 ? '<div class="surface"><strong>No cards found.</strong><p class="muted">Try clearing search/filters or scan another card.</p></div>' : ''}
          </section>`;
      }

      function renderCard() {
        const c = mock.cards[0];
        return `
          <section class="screen detail-grid">
            <article class="stack">
              <div class="row"><h3>${c.name}</h3><span class="badge">${c.set}</span></div>
              <div class="card-image"><strong>Card front image</strong></div>
              <div class="card-image"><strong>Card back image</strong></div>
              <article class="surface stack">
                <strong>Notes</strong>
                <textarea rows="4" placeholder="Strong centering. Tiny whitening top-right on back edge."></textarea>
              </article>
            </article>
            <aside class="stack">
              <article class="surface stack">
                <strong>AI Estimated Grade</strong>
                <p class="stat-value">${c.grade}</p>
                <div class="list-item row"><span>Corners</span><strong>8.8</strong></div>
                <div class="list-item row"><span>Edges</span><strong>9.0</strong></div>
                <div class="list-item row"><span>Surface</span><strong>9.3</strong></div>
                <div class="list-item row"><span>Centering</span><strong>9.2</strong></div>
              </article>
              <article class="surface stack">
                <strong>Recent sold comps</strong>
                ${mock.comps.map((r) => `<div class="list-item row"><span>${r.source}</span><strong>${r.price}</strong><span class="muted">${r.date}</span></div>`).join('')}
              </article>
              <article class="surface stack">
                <button class="app-btn">Update Collection Entry</button>
                <button class="app-btn secondary">Mark for Grading</button>
              </article>
            </aside>
          </section>`;
      }

      function renderAuth() {
        return `
          <section class="screen auth-grid">
            <article class="stack">
              <p class="kicker">Account</p>
              <h3>Sign in to sync your vault</h3>
              <p class="muted">Save scans, track card value over time, and keep your collection available across devices.</p>
              <label class="field">Email<input class="input" type="email" placeholder="collector@email.com" /></label>
              <label class="field">Password<input class="input" type="password" placeholder="••••••••" /></label>
              <div class="cta-row">
                <button id="loginBtn" class="app-btn">Login</button>
                <button id="signupBtn" class="app-btn secondary">Create Account</button>
                <button class="app-btn ghost" data-route="scan">Continue as Guest</button>
              </div>
            </article>
            <article class="surface stack">
              <strong>Member benefits</strong>
              <div class="tile"><strong>Persistent collection</strong><p class="muted">Every scan saved to your vault profile.</p></div>
              <div class="tile"><strong>Market tracking</strong><p class="muted">Stay on top of comp changes and trends.</p></div>
              <div class="tile"><strong>Release watchlist</strong><p class="muted">Track upcoming product launches.</p></div>
            </article>
          </section>`;
      }

      function renderReleases() {
        return `
          <section class="screen stack">
            <div class="row" style="flex-wrap:wrap"><h3>Upcoming Releases</h3><div class="toolbar"><select class="select"><option>All Games</option><option>Pokémon</option><option>NBA</option><option>One Piece</option><option>MTG</option></select><select class="select"><option>All Types</option><option>ETB</option><option>Hobby</option><option>Booster</option><option>Set</option></select></div></div>
            <div class="list">
              ${mock.releases
                .map(
                  (r) => `<article class="list-item"><div class="row"><strong>${r.name}</strong><span class="badge warn">${r.hype}</span></div><p class="muted">${r.game} • ${r.type}</p><div class="row"><span>Release date</span><strong>${r.date}</strong></div><button class="app-btn secondary" style="margin-top:.5rem">Add to Watchlist</button></article>`,
                )
                .join('')}
            </div>
          </section>`;
      }

      const screens = { home: renderHome, scan: renderScan, dashboard: renderDashboard, collection: renderCollection, card: renderCard, auth: renderAuth, releases: renderReleases };

      function navButton(route) {
        return `<button class="tab ${state.route === route ? 'active' : ''}" data-route="${route}">${routeLabel[route] || route}</button>`;
      }

      function bindSharedEvents() {
        document.querySelectorAll('[data-route]').forEach((el) =>
          el.addEventListener('click', () => {
            state.route = visibleRoute(el.dataset.route);
            render();
          }),
        );

        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        if (loginBtn) loginBtn.onclick = () => setSignedIn(true);
        if (signupBtn) signupBtn.onclick = () => setSignedIn(true);

        const frontUpload = document.getElementById('frontUpload');
        const backUpload = document.getElementById('backUpload');
        const analyzeBtn = document.getElementById('analyzeBtn');
        if (frontUpload) frontUpload.onclick = () => {
          state.scanReady = true;
          render();
        };
        if (backUpload) backUpload.onclick = () => {
          state.scanBackReady = true;
          render();
        };
        if (analyzeBtn)
          analyzeBtn.onclick = () => {
            if (state.scanReady && state.scanBackReady) {
              state.scanAnalyzed = true;
              render();
            }
          };

        const gridMode = document.getElementById('gridMode');
        const listMode = document.getElementById('listMode');
        const searchInput = document.getElementById('searchInput');
        if (gridMode) gridMode.onclick = () => {
          state.collectionView = 'grid';
          render();
        };
        if (listMode) listMode.onclick = () => {
          state.collectionView = 'list';
          render();
        };
        if (searchInput)
          searchInput.oninput = (e) => {
            state.search = e.target.value;
            render();
          };

        document.querySelectorAll('[data-game]').forEach((el) => {
          el.onclick = () => {
            state.gameFilter = el.dataset.game;
            render();
          };
        });
      }

      function setSignedIn(v) {
        state.signedIn = v;
        state.route = v ? 'dashboard' : 'home';
        render();
      }

      function render() {
        state.route = visibleRoute(state.route);
        const tabs = activeRoutes();
        document.getElementById('desktopTabs').innerHTML = tabs.map(navButton).join('');
        document.getElementById('mobileTabs').innerHTML = tabs.map(navButton).join('');
        document.getElementById('screen').innerHTML = screens[state.route]();

        const authToggle = document.getElementById('authToggle');
        authToggle.textContent = state.signedIn ? 'Sign out' : 'Sign in';
        authToggle.onclick = () => setSignedIn(!state.signedIn);

        const scanQuick = document.getElementById('scanQuick');
        scanQuick.onclick = () => {
          state.route = 'scan';
          render();
        };

        bindSharedEvents();
      }

      render();
    </script>
  </body>
</html>
