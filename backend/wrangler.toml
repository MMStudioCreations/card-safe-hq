name = "cardsafehq-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
account_id = "ba8de8decc22986f0cc7a0541902bc94"

[[d1_databases]]
binding = "DB"
database_name = "card-vault-db"
database_id = "ed48e805-d198-4f01-9d09-f45649ad4f9f"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "varimg"

[vars]
CORS_ORIGIN = "https://cardsafehq.com"
MAIL_FROM = "Card Safe HQ <noreply@cardsafehq.com>"
TCGFAST_BASE_URL = "https://api.tcgpricelookup.com/v1"
PRICECHARTING_BASE_URL = "https://www.pricecharting.com/api"
# Set RESEND_API_KEY as a secret via: wrangler secret put RESEND_API_KEY

[triggers]
crons = ["0 4 * * *", "0 */12 * * *"]

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
